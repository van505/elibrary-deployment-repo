[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd",
    "npm install",
    "npm run build",
    "php artisan config:clear",
    "php artisan route:clear",
    "php artisan view:clear",
    "php artisan view:cache"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan db:seed --class=SubscriptionPlanSeeder --force && php artisan db:seed --class=SettingsSeeder --force && php -d upload_max_filesize=100M -d post_max_size=100M -S 0.0.0.0:$PORT -t public"
